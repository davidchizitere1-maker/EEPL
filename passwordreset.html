    <script>
        const API_URL = 'http://localhost:3000';

        async function submitNewPassword() {
            const token = document.getElementById('reset-token').value;
            const newPassword = document.getElementById('new-password').value;
            const errorBox = document.getElementById('error-box');
            const successBox = document.getElementById('success-box');

            // Reset UI
            errorBox.style.display = 'none';
            successBox.style.display = 'none';

            if (!token || !newPassword) {
                errorBox.innerText = "Please fill in all fields.";
                errorBox.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/users/reset-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ token, newPassword })
                });

                if (response.ok) {
                    successBox.innerText = "Password updated! Redirecting to login...";
                    successBox.style.display = 'block';
                    setTimeout(() => {
                        window.location.href = 'login.html'; // Adjust to your login page name
                    }, 3000);
                } else {
                    const msg = await response.text();
                    errorBox.innerText = msg || "Invalid token.";
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = "Connection lost. Is the server running?";
                errorBox.style.display = 'block';
            }
        }

        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }
