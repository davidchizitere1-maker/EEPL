    <script>
        const API_URL = 'http://localhost:3000';

        function showError(inputElement, message) {
            clearErrors();
            const errorDiv = document.createElement('div');
            errorDiv.className = 'error-msg';
            errorDiv.innerText = `* ${message}`;
            
            inputElement.classList.add('input-error');
            inputElement.closest('.input-group').appendChild(errorDiv);
            inputElement.focus();
        }

        function clearErrors() {
            document.querySelectorAll('.error-msg').forEach(el => el.remove());
            document.querySelectorAll('.input-error').forEach(el => el.classList.remove('input-error'));
        }

        function showAuth(type) {
            clearErrors();
            document.getElementById('login-form').classList.toggle('active', type === 'login');
            document.getElementById('signup-form').classList.toggle('active', type === 'signup');
        }

        async function registerUser() {
            clearErrors();
            const fName = document.getElementById('signup-firstname');
            const lName = document.getElementById('signup-lastname');
            const email = document.getElementById('signup-email');
            const pass = document.getElementById('signup-password');
            const terms = document.getElementById('terms');

            if (!fName.value) return showError(fName, "First name required");
            if (!lName.value) return showError(lName, "Last name required");
            if (!email.value) return showError(email, "Email required");
            if (!pass.value) return showError(pass, "Password required");
            if (!terms.checked) return showError(terms, "Accept our Terms");

            try {
                const response = await fetch(`${API_URL}/users`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        firstname: fName.value, 
                        lastname: lName.value, 
                        email: email.value, 
                        password: pass.value 
                    })
                });

                if (response.status === 201) {
                    showWelcomeScreen(fName.value);
                } else {
                    const msg = await response.text();
                    showError(email, msg || "Registration failed");
                }
            } catch (e) { 
                showError(fName, "Server connection failed"); 
            }
        }

        async function loginUser() {
            clearErrors();
            const email = document.getElementById('login-email');
            const pass = document.getElementById('login-password');

            if (!email.value) return showError(email, "Enter your email");
            if (!pass.value) return showError(pass, "Enter your password");

            try {
                const response = await fetch(`${API_URL}/users/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email: email.value, password: pass.value })
                });

                const msg = await response.text();
                
                if (msg === 'Success') {
                    const displayName = email.value.split('@')[0];
                    showWelcomeScreen(displayName);
                } else if (msg === 'Invalid Password') {
                    showError(pass, "Incorrect Password");
                } else if (msg === 'Entity does not exist' || response.status === 400) {
                    showError(email, "Entity does not exist");
                } else {
                    showError(email, "Login failed");
                }
            } catch (e) { 
                showError(email, "Server connection failed"); 
            }
        }

        function showWelcomeScreen(name) {
            const authCard = document.querySelector('.auth-card');
            authCard.innerHTML = `
                <div style="animation: fadeIn 0.8s ease;">
                    <h2 style="color: #00e5ff;">Welcome, ${name}!</h2>
                    <p style="letter-spacing: 2px;">SYNCHRONIZING ENTITY DATA...</p>
                    <div class="loader"></div>
                </div>
            `;
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('userName', name);
            setTimeout(() => { 
                window.location.href = 'index.html'; 
            }, 2500);
        }

        function toggleMenu() {
            const navLinks = document.getElementById('navLinks');
            navLinks.classList.toggle('active');
        }

        
    </script>
