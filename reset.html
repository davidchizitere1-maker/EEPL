    <script>
        const API_URL = 'http://localhost:3000';

        async function initiateRecovery() {
            const email = document.getElementById('recover-email').value;
            const errorBox = document.getElementById('error-box');

            errorBox.style.display = 'none';

            if (!email) {
                errorBox.innerText = "Email is required to proceed.";
                errorBox.style.display = 'block';
                return;
            }

            try {
                const response = await fetch(`${API_URL}/users/forgot-password`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email })
                });

                if (response.ok) {
                    const result = await response.json();
                    
                    // Logic: Serve the token (simulating an email)
                    alert("PROTOCOL INITIATED\nYour Recovery Token is: " + result.token);
                    
                    // Redirecting to Step 2 (Reset Page)
                    window.location.href = 'passwordreset.html';
                } else {
                    errorBox.innerText = "Identity not found in Entity Records.";
                    errorBox.style.display = 'block';
                }
            } catch (err) {
                errorBox.innerText = "System Offline. Connection failed.";
                errorBox.style.display = 'block';
            }
        }
